<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三连棋 - 5×5 策略棋盘</title>
<style>
/* ===== CSS Reset & Variables ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-1: #0f0c29;
  --bg-2: #302b63;
  --bg-3: #24243e;
  --card-bg: rgba(255,255,255,0.07);
  --card-hover: rgba(255,255,255,0.12);
  --text: #e8e8e8;
  --text-dim: #999;
  --accent: #f0c040;
  --x-color: #FF6B6B;
  --x-glow: rgba(255,107,107,0.4);
  --o-color: #4ECDC4;
  --o-glow: rgba(78,205,196,0.4);
  --board-bg: rgba(255,255,255,0.05);
  --grid: rgba(255,255,255,0.35);
  --shadow-lg: 0 16px 48px rgba(0,0,0,0.4);
  --radius: 16px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* Subtle animated background particles */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(255,107,107,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(78,205,196,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 0%, rgba(240,192,64,0.05) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}

#app {
  position: relative; z-index: 1;
  width: 100%; max-width: 520px;
  padding: 20px;
}

/* ===== Screen Management ===== */
.screen { display: none; }
.screen.active { display: block; }

/* ===== Main Menu ===== */
.menu-title {
  text-align: center;
  margin-bottom: 8px;
  font-size: 3rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  background: linear-gradient(180deg, var(--accent) 0%, #d4942b 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.menu-subtitle {
  text-align: center;
  font-size: 1rem;
  color: var(--text-dim);
  margin-bottom: 36px;
  letter-spacing: 0.04em;
}

.menu-cards {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.menu-card {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius);
  padding: 22px 28px;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
  box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  position: relative;
  overflow: hidden;
}
.menu-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  background: var(--card-hover);
}
.menu-card:active { transform: translateY(-1px); }

.menu-card .card-icon {
  font-size: 2rem;
  margin-bottom: 6px;
}
.menu-card .card-title {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 4px;
}
.menu-card .card-desc {
  font-size: 0.85rem;
  color: var(--text-dim);
}

/* Side toggle inside PvAI card */
.side-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  font-size: 0.9rem;
}
.side-toggle .toggle-label { color: var(--text-dim); }
.side-toggle .toggle-options {
  display: flex;
  background: rgba(255,255,255,0.06);
  border-radius: 8px;
  overflow: hidden;
}
.side-toggle .toggle-btn {
  padding: 6px 16px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 500;
  transition: background var(--transition), color var(--transition);
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
}
.side-toggle .toggle-btn.active {
  background: rgba(255,255,255,0.15);
  color: var(--text);
}

/* ===== Game Screen ===== */
.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
/* 权重开关 */
.weight-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  font-size: 0.8rem;
  color: var(--text-dim);
  user-select: none;
}
.weight-toggle input { display: none; }
.toggle-slider {
  width: 32px; height: 18px;
  background: rgba(255,255,255,0.15);
  border-radius: 9px;
  position: relative;
  transition: background var(--transition);
}
.toggle-slider::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  background: #fff;
  border-radius: 50%;
  transition: transform var(--transition);
}
.weight-toggle input:checked + .toggle-slider {
  background: var(--accent);
}
.weight-toggle input:checked + .toggle-slider::after {
  transform: translateX(14px);
}
.toggle-text { font-size: 0.75rem; }
.btn-header {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.85rem;
  font-family: inherit;
  transition: background var(--transition);
}
.btn-header:hover { background: rgba(255,255,255,0.15); }

.game-mode-label {
  font-size: 0.9rem;
  color: var(--text-dim);
  text-align: center;
}

/* Score & Turn */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-around;
  margin-bottom: 10px;
  padding: 8px 12px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
}
.player-info {
  text-align: center;
  min-width: 80px;
}
.player-symbol {
  font-size: 1.6rem;
  font-weight: 700;
  line-height: 1;
}
.player-score {
  font-size: 1.2rem;
  font-weight: 600;
  margin-top: 2px;
}
.player-info.x .player-symbol { color: var(--x-color); }
.player-info.o .player-symbol { color: var(--o-color); }
.vs-text { font-size: 0.9rem; color: var(--text-dim); }

.turn-indicator {
  text-align: center;
  font-size: 0.95rem;
  margin-bottom: 12px;
  min-height: 24px;
  font-weight: 500;
  color: var(--accent);
}

/* Board Container */
.board-container {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  max-width: 440px;
  margin: 0 auto;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.board-container canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* Thinking Indicator */
.thinking-indicator {
  text-align: center;
  font-size: 0.9rem;
  color: var(--accent);
  margin-top: 12px;
  min-height: 22px;
  opacity: 0;
  transition: opacity 0.2s;
}
.thinking-indicator.visible { opacity: 1; }
.thinking-dots { display: inline-block; }
.thinking-dots span {
  animation: dot-blink 1.4s infinite;
  opacity: 0;
}
.thinking-dots span:nth-child(1) { animation-delay: 0.0s; }
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-blink {
  0%, 60%, 100% { opacity: 0; }
  30% { opacity: 1; }
}

/* ===== Game Over Modal ===== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s;
}
.overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: linear-gradient(145deg, rgba(30,30,60,0.97), rgba(20,20,50,0.97));
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 32px 28px;
  text-align: center;
  max-width: 380px;
  width: 90%;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  transform: scale(0.9);
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.overlay.active .modal { transform: scale(1); }

.modal-title {
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--accent);
}
.modal-scores {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  margin-bottom: 10px;
}
.modal-player {
  text-align: center;
}
.modal-player .sym {
  font-size: 2.2rem;
  font-weight: 700;
}
.modal-player .scr {
  font-size: 1.4rem;
  font-weight: 600;
  margin-top: 4px;
}
.modal-player.x .sym { color: var(--x-color); }
.modal-player.o .sym { color: var(--o-color); }
.modal-vs { font-size: 1.2rem; color: var(--text-dim); }

.modal-result {
  font-size: 1.3rem;
  font-weight: 700;
  margin: 12px 0 20px;
  padding: 10px;
  border-radius: 10px;
}
.modal-result.win { color: var(--accent); }
.modal-result.draw { color: var(--text-dim); }

.modal-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
}
.btn {
  padding: 10px 24px;
  border-radius: 10px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #c08320);
  color: #1a1a2e;
  box-shadow: 0 4px 16px rgba(240,192,64,0.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(240,192,64,0.4); }
.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.15);
}
.btn-secondary:hover { background: rgba(255,255,255,0.18); }

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .menu-title { font-size: 2.2rem; }
  .menu-subtitle { font-size: 0.85rem; margin-bottom: 24px; }
  .menu-card { padding: 16px 20px; }
  .menu-card .card-icon { font-size: 1.5rem; }
  .menu-card .card-title { font-size: 1.05rem; }
  .side-toggle { font-size: 0.8rem; }
  .side-toggle .toggle-btn { padding: 5px 12px; font-size: 0.8rem; }
  .status-bar { padding: 6px 8px; }
  .player-symbol { font-size: 1.3rem; }
  .player-score { font-size: 1rem; }
  .btn-header { padding: 6px 12px; font-size: 0.8rem; }
  .modal { padding: 24px 20px; }
  .modal-title { font-size: 1.3rem; }
  .modal-player .sym { font-size: 1.8rem; }
  .modal-result { font-size: 1.1rem; }
  .btn { padding: 8px 18px; font-size: 0.85rem; }
}
</style>
</head>
<body>

<div id="app">
  <!-- ===== Main Menu Screen ===== -->
  <div id="menu-screen" class="screen active">
    <h1 class="menu-title">三连棋</h1>
    <p class="menu-subtitle">5×5 策略棋盘 · 三连得分</p>
    <div class="menu-cards">
      <div class="menu-card" data-mode="pvp" id="card-pvp">
        <div class="card-icon">👥</div>
        <div class="card-title">双人对战</div>
        <div class="card-desc">两名玩家轮流点击落子</div>
      </div>
      <div class="menu-card" data-mode="pvai" id="card-pvai">
        <div class="card-icon">🤖</div>
        <div class="card-title">人机对战</div>
        <div class="card-desc">你与 AI 一决高下</div>
        <div class="side-toggle">
          <span class="toggle-label">你的棋子：</span>
          <div class="toggle-options" id="side-selector">
            <button class="toggle-btn active" data-human-side="x">✕ 先手</button>
            <button class="toggle-btn" data-human-side="o">○ 后手</button>
          </div>
        </div>
      </div>
      <div class="menu-card" data-mode="aivai" id="card-aivai">
        <div class="card-icon">⚔️</div>
        <div class="card-title">AI 对战</div>
        <div class="card-desc">AI 对决 · 每步间隔 0.5 秒</div>
      </div>
    </div>
  </div>

  <!-- ===== Game Screen ===== -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <button class="btn-header" id="btn-back">← 返回</button>
      <span class="game-mode-label" id="mode-label"></span>
      <div class="header-right">
        <label class="weight-toggle" id="weight-toggle-label" title="显示/隐藏权重">
          <input type="checkbox" id="toggle-weights">
          <span class="toggle-slider"></span>
          <span class="toggle-text">权重</span>
        </label>
        <button class="btn-header" id="btn-pause" style="display:none">⏸ 暂停</button>
      </div>
    </div>
    <div class="status-bar">
      <div class="player-info x" id="info-x">
        <div class="player-symbol">✕</div>
        <div class="player-score" id="score-x">0</div>
      </div>
      <span class="vs-text">VS</span>
      <div class="player-info o" id="info-o">
        <div class="player-symbol">○</div>
        <div class="player-score" id="score-o">0</div>
      </div>
    </div>
    <div class="turn-indicator" id="turn-indicator"></div>
    <div class="board-container" id="board-container">
      <canvas id="board-canvas"></canvas>
    </div>
    <div class="thinking-indicator" id="thinking">AI 思考中<span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span></div>
  </div>

  <!-- ===== Game Over Overlay ===== -->
  <div class="overlay" id="game-over-overlay">
    <div class="modal">
      <div class="modal-title">游戏结束</div>
      <div class="modal-scores">
        <div class="modal-player x">
          <div class="sym">✕</div>
          <div class="scr" id="modal-score-x">0</div>
        </div>
        <div class="modal-vs">VS</div>
        <div class="modal-player o">
          <div class="sym">○</div>
          <div class="scr" id="modal-score-o">0</div>
        </div>
      </div>
      <div class="modal-result" id="modal-result"></div>
      <div class="modal-buttons">
        <button class="btn btn-primary" id="btn-replay">再来一局</button>
        <button class="btn btn-secondary" id="btn-menu">返回主菜单</button>
      </div>
    </div>
  </div>
</div>

<script>
// =====================================================================
// 三连棋 - 完整游戏逻辑
// =====================================================================

// ----- 常量定义 -----
const EMPTY = 0, P_X = 1, P_O = 2;
const SIZE = 5;
const SYM = { [P_X]: '✕', [P_O]: '○' };
const CLR = { [P_X]: '#FF6B6B', [P_O]: '#4ECDC4' };
const GLOW = { [P_X]: 'rgba(255,107,107,0.45)', [P_O]: 'rgba(78,205,196,0.45)' };

// ----- 工具函数 -----
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

/** 基于坐标的确定性"伪随机"——保证同一格子的手绘风格一致 */
function cellRand(row, col) {
  let h = (row * 374761393 + col * 668265263 + 1274126177) | 0;
  h = ((h ^ (h >>> 13)) * 1274126177) | 0;
  h = (h ^ (h >>> 16)) | 0;
  return (h & 0x7fffffff) / 0x7fffffff;
}

/** 对手切换 */
function opponent(p) { return p === P_X ? P_O : P_X; }

// =====================================================================
// 音效管理器 (Web Audio API)
// =====================================================================
const Sound = (() => {
  let ctx = null;
  function init() {
    if (!ctx) {
      try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    if (ctx && ctx.state === 'suspended') ctx.resume();
  }
  function tone(freq, dur, type='sine', vol=0.18) {
    if (!ctx) return;
    try {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime + dur);
    } catch(e) { /* 静默处理 */ }
  }
  return {
    init,
    place: () => { tone(660, 0.08, 'sine', 0.15); tone(880, 0.06, 'sine', 0.10); },
    win:   () => { tone(523, 0.12, 'triangle', 0.22); setTimeout(()=>tone(659,0.12,'triangle',0.22),120); setTimeout(()=>tone(784,0.25,'triangle',0.25),240); },
    draw:  () => { tone(330, 0.3, 'triangle', 0.15); },
    click: () => { tone(440, 0.04, 'sine', 0.10); },
  };
})();

// =====================================================================
// 计分模块
// 规则：连续三个同色 → 1 分，连续四个 → 2 分，连续五个 → 3 分。
// 每条连线独立计分，长连不叠加短连（五连=3分，不是1+2+3=10分）。
// 所有方向（横、竖、两条对角线）独立计算。
// =====================================================================

/** 生成所有需要检查的连线（横5 + 竖5 + 两条对角线各5 = 共20条） */
function getAllLines(board) {
  const lines = [];
  // 横向
  for (let r = 0; r < SIZE; r++) {
    lines.push(Array.from({ length: SIZE }, (_, c) => board[r][c]));
  }
  // 竖向
  for (let c = 0; c < SIZE; c++) {
    lines.push(Array.from({ length: SIZE }, (_, r) => board[r][c]));
  }
  // 主对角线方向 (↘)：起点为顶边和左边
  for (const [sr, sc] of [[0,0],[0,1],[0,2],[1,0],[2,0]]) {
    const line = [];
    let r = sr, c = sc;
    while (r < SIZE && c < SIZE) { line.push(board[r][c]); r++; c++; }
    lines.push(line);
  }
  // 副对角线方向 (↙)
  for (const [sr, sc] of [[0,4],[0,3],[0,2],[1,4],[2,4]]) {
    const line = [];
    let r = sr, c = sc;
    while (r < SIZE && c >= 0) { line.push(board[r][c]); r++; c--; }
    lines.push(line);
  }
  return lines;
}

/** 对单条连线计分：扫描连续同色段，段长 L≥3 时按档位给分：
 *  3 连 → 1 分，4 连 → 2 分，5 连 → 3 分（不叠加）。 */
function scoreOneLine(line, player) {
  let s = 0, i = 0;
  while (i < line.length) {
    if (line[i] !== player) { i++; continue; }
    let j = i;
    while (j < line.length && line[j] === player) j++;
    const len = j - i;
    if (len === 3) s += 1;
    else if (len === 4) s += 2;
    else if (len === 5) s += 3;
    i = j;
  }
  return s;
}

function calculateScore(board, player) {
  let score = 0;
  for (const line of getAllLines(board)) {
    score += scoreOneLine(line, player);
  }
  return score;
}

// =====================================================================
// AI 权重计算模块
//
// 方向枚举法：
//   初始权重 a = 12。
//   对 4 个基本方向，检查以 (x,y) 为中心的三连线两端：
//     - 两端均被阻挡 → a -= 3（该线完全损失）
//     - 仅一端被阻挡 → a -= 2（半线受损）
//   远距离阻挡（Chebyshev 距离=2）：
//     若对手占据且中途格非对手 → a -= 1。
//   方向枚举天然避免了对位重复扣分。
//   最终返回 max(0, a)。
// =====================================================================
const AI = (() => {

  /**
   * getWeight(x, y, board, currentPlayer) — 方向枚举法
   * 若 (x,y) 已有棋子返回 -1；否则返回 max(0, a)，a 初始 12。
   */
  function weight(x, y, board, player) {
    if (board[x][y] !== EMPTY) return -1;

    const opp = opponent(player);

    // is_block: out of bounds OR occupied by opponent → blocked
    function is_block(r, c) {
      if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) return true;
      return board[r][c] === opp;
    }

    let a = 12;

    // Step 1: 4-direction enumeration — check near/far ends of 3-in-a-row through (x,y)
    const dirs = [[0, 1], [1, 0], [1, 1], [1, -1]];
    for (const [dr, dc] of dirs) {
      const nearBlocked = is_block(x - dr, y - dc);
      const farBlocked  = is_block(x + dr, y + dc);
      if (nearBlocked && farBlocked) {
        a -= 3;
      } else if (nearBlocked || farBlocked) {
        a -= 2;
      }
    }

    // Step 2: far-distance penalty — 8 on-axis cells at Chebyshev distance 2
    // Only the 8 cells (x±2,y), (x,y±2), (x±2,y±2), (x±2,y∓2) correspond
    // to endpoints of the 12 possible 3-in-a-rows through (x,y).
    // Off-axis cells (e.g. (1,-1) from (0,1)) share the same midpoint via
    // floor() and would double-penalise — they are not line endpoints.
    for (const [dr, dc] of dirs) {
      // Near side distance-2 cell
      const nr2 = x - 2*dr, nc2 = y - 2*dc;
      if (is_block(nr2, nc2)) {
        const mr = x - dr, mc = y - dc;
        if (mr >= 0 && mr < SIZE && mc >= 0 && mc < SIZE && board[mr][mc] !== opp) {
          a -= 1;
        }
      }
      // Far side distance-2 cell
      const fr2 = x + 2*dr, fc2 = y + 2*dc;
      if (is_block(fr2, fc2)) {
        const mr = x + dr, mc = y + dc;
        if (mr >= 0 && mr < SIZE && mc >= 0 && mc < SIZE && board[mr][mc] !== opp) {
          a -= 1;
        }
      }
    }

    return Math.max(0, a);
  }

  /**
   * 为 player 寻找最佳落子位置。
   * 1. 计算所有空格权重
   * 2. 若最大权重 < 0 → 游戏结束（返回 null）
   * 3. 否则从最大权重格子中随机选一
   */
  function findBestMove(board, player) {
    let best = [];
    let maxW = -1;

    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const w = weight(r, c, board, player);
        if (w > maxW) {
          maxW = w;
          best = [{ row: r, col: c }];
        } else if (w === maxW) {
          best.push({ row: r, col: c });
        }
      }
    }

    if (maxW < 0 || best.length === 0) return null;
    return best[Math.floor(Math.random() * best.length)];
  }

  return { calcWeight: weight, findBestMove };
})();

// =====================================================================
// 棋盘渲染器 (Canvas)
// =====================================================================
class BoardRenderer {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.size = 400;      // 逻辑尺寸
    this.cellSize = 0;
    this.padding = 0;
    this.hoverCell = null;     // {row, col} | null
    this.hoverWeight = 0;      // 当前悬停格权重（用于高亮强度）
    this.lastMove = null;      // {row, col} | null
    this.board = null;         // 当前棋盘数据引用
    this._resize();
    window.addEventListener('resize', () => this._resize());
  }

  _resize() {
    const container = this.canvas.parentElement;
    // 容器可能隐藏（display:none → clientWidth=0），使用 fallback
    const w = container.clientWidth || 400;
    const displaySize = Math.min(w, 440);
    if (displaySize <= 0) return;
    this.canvas.style.width = displaySize + 'px';
    this.canvas.style.height = displaySize + 'px';
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.canvas.width = displaySize * dpr;
    this.canvas.height = displaySize * dpr;
    this.ctx.setTransform(1, 0, 0, 1, 0, 0);
    this.ctx.scale(dpr, dpr);
    this.displaySize = displaySize;
    this.cellSize = displaySize / (SIZE + 1.4);  // 留出边距
    this.padding = (displaySize - this.cellSize * SIZE) / 2;
  }

  /** 将像素坐标转为棋盘行列，失败返回 null */
  cellFromPoint(px, py) {
    const rect = this.canvas.getBoundingClientRect();
    const x = px - rect.left;
    const y = py - rect.top;
    const scaleX = this.displaySize / rect.width;
    const scaleY = this.displaySize / rect.height;
    const cx = x * scaleX;
    const cy = y * scaleY;
    const col = Math.floor((cx - this.padding) / this.cellSize);
    const row = Math.floor((cy - this.padding) / this.cellSize);
    if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) return null;
    // 再检查是否在格子中心的合理范围内
    const cellCX = this.padding + col * this.cellSize + this.cellSize / 2;
    const cellCY = this.padding + row * this.cellSize + this.cellSize / 2;
    const dx = cx - cellCX, dy = cy - cellCY;
    if (Math.sqrt(dx*dx+dy*dy) > this.cellSize * 0.52) return null;
    return { row, col };
  }

  /** 绘制整个棋盘 */
  render(board, hoverCell, hoverWeight, lastMove, weights) {
    this.board = board;
    this.hoverCell = hoverCell;
    this.hoverWeight = hoverWeight || 0;
    this.lastMove = lastMove;
    const ctx = this.ctx;
    const s = this.displaySize;
    const cs = this.cellSize;
    const pad = this.padding;

    ctx.clearRect(0, 0, s, s);

    // --- 棋盘背景 ---
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1.5;
    roundRect(ctx, pad - 6, pad - 6, cs * SIZE + 12, cs * SIZE + 12, 10, true, true);

    // --- 网格线 ---
    ctx.strokeStyle = 'rgba(255,255,255,0.28)';
    ctx.lineWidth = 1.2;
    for (let i = 0; i <= SIZE; i++) {
      // 横线
      ctx.beginPath();
      ctx.moveTo(pad, pad + i * cs);
      ctx.lineTo(pad + SIZE * cs, pad + i * cs);
      ctx.stroke();
      // 竖线
      ctx.beginPath();
      ctx.moveTo(pad + i * cs, pad);
      ctx.lineTo(pad + i * cs, pad + SIZE * cs);
      ctx.stroke();
    }
    // 四角小圆点装饰
    for (const [dr, dc] of [[0,0],[0,SIZE],[SIZE,0],[SIZE,SIZE]]) {
      ctx.beginPath();
      ctx.arc(pad + dc * cs, pad + dr * cs, cs * 0.08, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fill();
    }

    // --- 悬停高亮 ---
    if (hoverCell && board[hoverCell.row][hoverCell.col] === EMPTY) {
      const cx = pad + hoverCell.col * cs + cs / 2;
      const cy = pad + hoverCell.row * cs + cs / 2;
      const alpha = 0.15 + (this.hoverWeight / 12) * 0.5; // 权重越高越亮
      ctx.beginPath();
      ctx.arc(cx, cy, cs * 0.42, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha.toFixed(2)})`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx, cy, cs * 0.42, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,255,255,${(alpha+0.15).toFixed(2)})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // --- 最后一手高亮 ---
    if (lastMove) {
      const cx = pad + lastMove.col * cs + cs / 2;
      const cy = pad + lastMove.row * cs + cs / 2;
      ctx.beginPath();
      ctx.arc(cx, cy, cs * 0.46, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(240,192,64,0.6)';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }

    // --- 棋子 ---
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] === EMPTY) continue;
        const cx = pad + c * cs + cs / 2;
        const cy = pad + r * cs + cs / 2;
        this._drawPiece(ctx, cx, cy, cs * 0.7, board[r][c], r, c);
      }
    }

    // --- 权重数字（开关打开时显示）---
    if (weights) {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const maxW = 12;
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const w = weights[r][c];
          if (w < 0) continue; // 已有棋子，不显示
          const cx = pad + c * cs + cs / 2;
          const cy = pad + r * cs + cs / 2;
          // 权重越高绿色越亮，越低红色越暗
          const t = Math.max(0, w / maxW);
          const red   = Math.round(180 - t * 140);
          const green = Math.round(100 + t * 155);
          const blue  = Math.round(80  + t * 60);
          const alpha  = 0.5 + t * 0.4;
          ctx.font = `bold ${(cs * 0.24).toFixed(0)}px "Segoe UI", "PingFang SC", sans-serif`;
          ctx.fillStyle = `rgba(${red},${green},${blue},${alpha.toFixed(2)})`;
          ctx.fillText(w.toFixed(0), cx, cy);
        }
      }
    }
  }

  /** 手绘风格棋子 */
  _drawPiece(ctx, cx, cy, size, player, row, col) {
    const rng = cellRand(row, col); // 确定性随机，保证每格风格一致
    const rng2 = cellRand(col, row); // 另一组随机值
    const color = CLR[player];
    const glow = GLOW[player];

    // 发光层
    ctx.save();
    ctx.shadowColor = glow;
    ctx.shadowBlur = size * 0.35;

    if (player === P_X) {
      // ---- ✕ 手绘风格：两条微弧交叉线 ----
      const pad = size * 0.3;
      ctx.strokeStyle = color;
      ctx.lineWidth = size * 0.15;
      ctx.lineCap = 'round';

      // 左上→右下（加入微弧偏移）
      ctx.beginPath();
      const d1 = (rng - 0.5) * size * 0.12;
      ctx.moveTo(cx - pad, cy - pad);
      ctx.quadraticCurveTo(cx + d1, cy, cx + pad, cy + pad);
      ctx.stroke();

      // 右上→左下
      ctx.beginPath();
      const d2 = (rng2 - 0.5) * size * 0.12;
      ctx.moveTo(cx + pad, cy - pad);
      ctx.quadraticCurveTo(cx + d2, cy, cx - pad, cy + pad);
      ctx.stroke();
    } else {
      // ---- ○ 手绘风格：微椭圆 + 稍不规则 ----
      ctx.strokeStyle = color;
      ctx.lineWidth = size * 0.15;
      ctx.lineCap = 'round';
      const rx = size * 0.38 + (rng - 0.5) * size * 0.04;
      const ry = size * 0.38 + (rng2 - 0.5) * size * 0.04;
      ctx.beginPath();
      // 用贝塞尔曲线近似手绘圆
      const k = 0.5522847498;
      ctx.moveTo(cx, cy - ry);
      ctx.bezierCurveTo(cx + rx * k, cy - ry, cx + rx, cy - ry * k, cx + rx, cy);
      ctx.bezierCurveTo(cx + rx, cy + ry * k, cx + rx * k, cy + ry, cx, cy + ry);
      ctx.bezierCurveTo(cx - rx * k, cy + ry, cx - rx, cy + ry * k, cx - rx, cy);
      ctx.bezierCurveTo(cx - rx, cy - ry * k, cx - rx * k, cy - ry, cx, cy - ry);
      ctx.stroke();
    }
    ctx.restore();
  }
}

/** Canvas roundRect 辅助 */
function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

// =====================================================================
// 游戏控制器
// =====================================================================
class Game {
  constructor() {
    // DOM 元素
    this.menuScreen   = document.getElementById('menu-screen');
    this.gameScreen   = document.getElementById('game-screen');
    this.overlay      = document.getElementById('game-over-overlay');
    this.turnInd      = document.getElementById('turn-indicator');
    this.thinkingEl   = document.getElementById('thinking');
    this.scoreXEl     = document.getElementById('score-x');
    this.scoreOEl     = document.getElementById('score-o');
    this.modeLabel    = document.getElementById('mode-label');
    this.btnPause     = document.getElementById('btn-pause');

    // Canvas 渲染器
    const canvas = document.getElementById('board-canvas');
    this.renderer = new BoardRenderer(canvas);

    // 游戏状态
    this.board   = [];   // 5×5 二维数组
    this.currentPlayer = P_X;
    this.scores  = { [P_X]: 0, [P_O]: 0 };
    this.mode    = '';          // 'pvp' | 'pvai' | 'aivai'
    this.humanSide = P_X;      // 人机模式中玩家执子
    this.hoverCell  = null;
    this.hoverWeight = 0;
    this.lastMove   = null;
    this.isAIThinking = false;
    this.paused     = false;
    this.gameOver   = false;
    this.moveCount  = 0;
    this._generation = 0;     // 代际计数器，防止过期 AI 调度
    this._lastTouchX = 0;
    this._lastTouchY = 0;
    this.showWeights = false;  // 权重显示开关
    this._weights = null;      // 缓存当前权重矩阵

    this._bindEvents();
  }

  // ----- 事件绑定 -----
  _bindEvents() {
    // 菜单按钮
    document.getElementById('card-pvp').addEventListener('click', () => this.start('pvp'));
    document.getElementById('card-pvai').addEventListener('click', () => this.start('pvai'));
    document.getElementById('card-aivai').addEventListener('click', () => this.start('aivai'));

    // 先后手切换
    document.querySelectorAll('#side-selector .toggle-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('#side-selector .toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    // 棋盘点击 & 触摸
    const canvas = document.getElementById('board-canvas');
    canvas.addEventListener('click', (e) => this._onBoardClick(e));
    canvas.addEventListener('mousemove', (e) => this._onBoardHover(e));
    canvas.addEventListener('mouseleave', () => { this.hoverCell = null; this._render(); });
    // 移动端触摸支持
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (e.touches.length === 1) {
        this._onBoardHover(e.touches[0]);
      }
    }, { passive: false });
    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (this.hoverCell) {
        this._onBoardClick({ clientX: this._lastTouchX, clientY: this._lastTouchY });
      }
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });

    // 权重显示开关
    document.getElementById('toggle-weights').addEventListener('change', (e) => {
      this.showWeights = e.target.checked;
      this._render();
    });

    // 标题栏按钮
    document.getElementById('btn-back').addEventListener('click', () => this.backToMenu());
    this.btnPause.addEventListener('click', () => this._togglePause());

    // 游戏结束弹窗
    document.getElementById('btn-replay').addEventListener('click', () => this.start(this.mode));
    document.getElementById('btn-menu').addEventListener('click', () => this.backToMenu());

    // 窗口尺寸变化重绘
    window.addEventListener('resize', () => {
      this.renderer._resize();
      this._render();
    });
  }

  // ----- 启动游戏 -----
  start(mode) {
    Sound.init();

    // 递增代际，使任何挂起的旧 AI 调度失效
    this._generation++;

    // 读取人机模式中玩家的先后手选择
    if (mode === 'pvai') {
      const activeBtn = document.querySelector('#side-selector .toggle-btn.active');
      this.humanSide = (activeBtn && activeBtn.dataset.humanSide === 'o') ? P_O : P_X;
    }

    // 初始化棋盘
    this.board = Array.from({ length: SIZE }, () => new Array(SIZE).fill(EMPTY));
    this.currentPlayer = P_X;
    this.scores = { [P_X]: 0, [P_O]: 0 };
    this.mode = mode;
    this.lastMove = null;
    this.isAIThinking = false;
    this.paused = false;
    this.gameOver = false;
    this.moveCount = 0;

    // 更新 UI
    this.menuScreen.classList.remove('active');
    this.gameScreen.classList.add('active');
    this.overlay.classList.remove('active');

    // Canvas 容器现已可见，重新计算尺寸
    this.renderer._resize();

    this.btnPause.style.display = (mode === 'aivai') ? '' : 'none';
    this.btnPause.textContent = '⏸ 暂停';
    this.thinkingEl.classList.remove('visible');

    // 模式标签
    const labels = {
      pvp: '双人对战', pvai: '人机对战', aivai: 'AI 对战'
    };
    this.modeLabel.textContent = labels[mode];
    if (mode === 'pvai') {
      this.modeLabel.textContent = `人机对战 · 你执 ${SYM[this.humanSide]}`;
    }

    this._updateUI();
    this._render();

    // 若 AI 先手 → 触发 AI 落子
    if (this._isAITurn()) {
      this._scheduleAIMove();
    }
  }

  // ----- 棋盘点击处理 -----
  _onBoardClick(e) {
    if (this.gameOver || this.isAIThinking || this.paused) return;
    if (this._isAITurn()) return; // AI 回合不接受点击

    const cell = this.renderer.cellFromPoint(e.clientX, e.clientY);
    if (!cell) return;
    if (this.board[cell.row][cell.col] !== EMPTY) return;

    this._placePiece(cell.row, cell.col);
    this._afterMove();
  }

  // ----- 悬停处理 -----
  _onBoardHover(e) {
    if (this.gameOver || this.isAIThinking) return;
    this._lastTouchX = e.clientX;
    this._lastTouchY = e.clientY;
    const cell = this.renderer.cellFromPoint(e.clientX, e.clientY);
    this.hoverCell = cell;

    // 计算悬停格权重（用于高亮强度）
    if (cell && this.board[cell.row][cell.col] === EMPTY &&
        (this.mode === 'pvai' || this.mode === 'aivai')) {
      // 始终以当前玩家视角计算权重
      this.hoverWeight = AI.calcWeight(cell.row, cell.col, this.board, this.currentPlayer);
    } else if (cell && this.board[cell.row][cell.col] === EMPTY) {
      this.hoverWeight = 6; // PvP 模式默认中等亮度
    } else {
      this.hoverWeight = 0;
    }
    this._render();
  }

  // ----- 落子（仅操作棋盘状态）-----
  _placePiece(row, col) {
    this.board[row][col] = this.currentPlayer;
    this.lastMove = { row, col };
    this.moveCount++;
    Sound.place();

    // 更新分数
    this.scores[P_X] = calculateScore(this.board, P_X);
    this.scores[P_O] = calculateScore(this.board, P_O);

    this._render();
    this._updateUI();
  }

  // ----- 落子后处理：检查结束、切换回合、调度 AI -----
  _afterMove() {
    // 检查游戏是否结束
    if (this._checkGameOver()) {
      this.isAIThinking = false;
      this.thinkingEl.classList.remove('visible');
      return;
    }

    // 切换玩家
    this.currentPlayer = opponent(this.currentPlayer);
    this._updateUI();
    this._render();  // 刷新权重显示（若开关打开，显示新玩家的视角）

    // 若新回合是 AI → 调度 AI
    if (this._isAITurn()) {
      this._scheduleAIMove();
    } else {
      // 轮到人类 → 清除 AI 思考状态
      this.isAIThinking = false;
      this.thinkingEl.classList.remove('visible');
    }
  }

  // ----- AI 落子调度 -----
  async _scheduleAIMove() {
    if (this.gameOver) return;

    // 暂停检查
    if (this.mode === 'aivai' && this.paused) return;

    const gen = this._generation;  // 捕获当前代际

    this.isAIThinking = true;
    this.thinkingEl.classList.add('visible');
    this.hoverCell = null;
    this._render();
    this._updateUI();

    const delayMs = this.mode === 'aivai' ? 500 : 200;
    await delay(delayMs);

    // 等待期间可能发生暂停、返回菜单、或新游戏开始（代际变化）
    if (this._generation !== gen || this.paused || this.gameOver ||
        !this.gameScreen.classList.contains('active')) {
      this.isAIThinking = false;
      this.thinkingEl.classList.remove('visible');
      return;
    }

    const move = AI.findBestMove(this.board, this.currentPlayer);
    if (!move) {
      // 无合法位置
      this.thinkingEl.classList.remove('visible');
      this.isAIThinking = false;
      this._endGame();
      return;
    }

    // 落子，后续由 _afterMove 接管 isAIThinking 状态
    this._placePiece(move.row, move.col);
    this._afterMove();
  }

  // ----- 游戏结束检查 -----
  _checkGameOver() {
    if (this.moveCount >= SIZE * SIZE) {
      this._endGame();
      return true;
    }
    return false;
  }

  _endGame() {
    this.gameOver = true;
    this.isAIThinking = false;
    this.thinkingEl.classList.remove('visible');

    const sX = this.scores[P_X], sO = this.scores[P_O];

    document.getElementById('modal-score-x').textContent = sX;
    document.getElementById('modal-score-o').textContent = sO;

    const resultEl = document.getElementById('modal-result');
    if (sX > sO) {
      resultEl.textContent = '✕ 获胜！';
      resultEl.className = 'modal-result win';
      Sound.win();
    } else if (sO > sX) {
      resultEl.textContent = '○ 获胜！';
      resultEl.className = 'modal-result win';
      Sound.win();
    } else {
      resultEl.textContent = '平局';
      resultEl.className = 'modal-result draw';
      Sound.draw();
    }

    this.overlay.classList.add('active');
    this._render();
  }

  // ----- 暂停/继续（AI vs AI 模式）-----
  _togglePause() {
    this.paused = !this.paused;
    this.btnPause.textContent = this.paused ? '▶ 继续' : '⏸ 暂停';
    if (!this.paused && this._isAITurn() && !this.isAIThinking && !this.gameOver) {
      this._scheduleAIMove();
    }
  }

  // ----- 返回主菜单 -----
  backToMenu() {
    this.gameOver = true;
    this.paused = false;
    this.isAIThinking = false;
    this.gameScreen.classList.remove('active');
    this.overlay.classList.remove('active');
    this.menuScreen.classList.add('active');
    this.thinkingEl.classList.remove('visible');
  }

  // ----- 工具方法 -----
  /** 当前回合是否归 AI */
  _isAITurn() {
    if (this.mode === 'pvp') return false;
    if (this.mode === 'aivai') return true;
    // pvai 模式
    return this.currentPlayer !== this.humanSide;
  }

  _updateUI() {
    this.scoreXEl.textContent = this.scores[P_X];
    this.scoreOEl.textContent = this.scores[P_O];

    const turnInfo = document.getElementById('info-x');
    const turnInfoO = document.getElementById('info-o');
    turnInfo.style.opacity = (this.currentPlayer === P_X) ? '1' : '0.35';
    turnInfoO.style.opacity = (this.currentPlayer === P_O) ? '1' : '0.35';

    if (this.gameOver) {
      this.turnInd.textContent = '';
    } else if (this.isAIThinking) {
      this.turnInd.textContent = 'AI 思考中...';
    } else {
      let name = this.currentPlayer === P_X ? '✕ 叉' : '○ 圈';
      if (this.mode === 'pvai') {
        name += (this.currentPlayer === this.humanSide) ? '（你）' : '（AI）';
      }
      this.turnInd.textContent = `轮到：${name}`;
    }
  }

  _render() {
    // 若权重开关打开，计算当前玩家视角下所有空格的权重
    if (this.showWeights && !this.gameOver) {
      this._weights = this._computeWeightGrid();
    } else {
      this._weights = null;
    }
    this.renderer.render(this.board, this.hoverCell, this.hoverWeight, this.lastMove, this._weights);
  }

  /** 计算当前玩家视角下所有空格的权重矩阵 (5×5) */
  _computeWeightGrid() {
    const grid = [];
    for (let r = 0; r < SIZE; r++) {
      grid[r] = [];
      for (let c = 0; c < SIZE; c++) {
        grid[r][c] = AI.calcWeight(r, c, this.board, this.currentPlayer);
      }
    }
    return grid;
  }
}

// =====================================================================
// 启动应用
// =====================================================================
document.addEventListener('DOMContentLoaded', () => {
  new Game();
});
</script>
